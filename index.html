<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TauMail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede8;
      --text: #1a1a18;
      --text-secondary: #6b6b68;
      --text-tertiary: #9b9b97;
      --border: rgba(0,0,0,0.12);
      --border-mid: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --bg-secondary: #252523;
        --bg-tertiary: #2e2e2b;
        --text: #f0efea;
        --text-secondary: #9b9b97;
        --text-tertiary: #6b6b68;
        --border: rgba(255,255,255,0.1);
        --border-mid: rgba(255,255,255,0.2);
      }
    }

    body { font-family: var(--font); background: var(--bg-tertiary); color: var(--text); min-height: 100vh; padding: 0 1rem 2rem; }
    .brand { display: flex; align-items: center; gap: 10px; justify-content: center; padding: 22px 0 16px; }
    .brand svg { opacity: 0.7; }
    .brand-name { font-size: 20px; font-weight: 600; letter-spacing: 0.02em; color: var(--text-secondary); }
    .container { max-width: 960px; margin: 0 auto; }

    .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 1.5rem; }
    .greeting { font-size: 22px; font-weight: 500; }
    .date-str { font-size: 13px; color: var(--text-secondary); }

    .metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
    @media (max-width: 600px) { .metric-grid { grid-template-columns: repeat(2, 1fr); } }
    .metric { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 0.875rem 1rem; }
    .metric-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
    .metric-value { font-size: 22px; font-weight: 500; }
    .metric-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }

    .section-label { font-size: 11px; font-weight: 500; color: var(--text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }

    .grid-main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; margin-bottom: 16px; }
    @media (max-width: 620px) { .grid-main { grid-template-columns: 1fr; } }

    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }

    .exam-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .exam-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; position: relative; }
    .exam-card.urgent { border-color: #D85A30; }
    .exam-course-pill { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
    .exam-name { font-size: 13px; font-weight: 500; margin-bottom: 8px; line-height: 1.3; }
    .exam-days { font-size: 30px; font-weight: 500; line-height: 1; }
    .exam-days.urgent { color: #D85A30; }
    .exam-days-label { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }
    .exam-delete { position: absolute; top: 10px; right: 12px; font-size: 16px; color: var(--text-tertiary); background: none; border: none; cursor: pointer; line-height: 1; }
    .exam-delete:hover { color: var(--text); }

    .add-exam-btn {
      background: none;
      border: 0.5px dashed var(--border-mid);
      border-radius: var(--radius-lg);
      padding: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--text-tertiary);
      font-family: var(--font);
      min-height: 110px;
      width: 100%;
    }
    .add-exam-btn:hover { background: var(--bg-secondary); color: var(--text-secondary); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--bg); border-radius: var(--radius-lg); padding: 1.5rem; width: 340px; max-width: 90vw; border: 0.5px solid var(--border-mid); }
    .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
    .form-row { margin-bottom: 12px; }
    .form-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; display: block; }
    .form-input { width: 100%; font-size: 13px; font-family: var(--font); border: 0.5px solid var(--border-mid); border-radius: var(--radius-md); padding: 7px 10px; background: var(--bg); color: var(--text); }
    .form-input:focus { outline: none; border-color: var(--text-secondary); }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1rem; }
    .btn { font-size: 13px; font-family: var(--font); padding: 7px 16px; border-radius: var(--radius-md); cursor: pointer; border: 0.5px solid var(--border-mid); background: none; color: var(--text); }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }

    .course-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
    .course-row:last-child { border-bottom: none; padding-bottom: 0; }
    .course-name { font-size: 14px; font-weight: 500; }
    .course-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
    .unread-badge { font-size: 10px; font-weight: 500; color: #1e40af; background: #dbeafe; padding: 1px 7px; border-radius: 20px; white-space: nowrap; }

    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .filter-btn { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 0.5px solid var(--border-mid); background: none; color: var(--text-secondary); cursor: pointer; font-family: var(--font); }
    .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .assign-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
    .assign-row:last-child { border-bottom: none; padding-bottom: 0; }
    .assign-row.done .assign-title { text-decoration: line-through; color: var(--text-tertiary); }
    .checkbox { width: 16px; height: 16px; min-width: 16px; border: 0.5px solid var(--border-mid); border-radius: 4px; display: flex; align-items: center; justify-content: center; margin-top: 2px; font-size: 10px; }
    .checkbox.checked { background: var(--text); border-color: var(--text); color: var(--bg); }
    .assign-title { font-size: 13px; font-weight: 500; line-height: 1.4; }
    .assign-meta { font-size: 11px; color: var(--text-secondary); margin-top: 3px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .course-pill { font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 20px; }
    .due-soon { color: #993C1D; font-weight: 500; }
    .due-future { color: var(--text-tertiary); }
    .empty { font-size: 13px; color: var(--text-tertiary); padding: 8px 0; }

    .refresh-btn { font-size: 12px; color: var(--text-tertiary); background: none; border: none; cursor: pointer; font-family: var(--font); padding: 0; margin-left: 6px; }
    .refresh-btn:hover { color: var(--text); }
    .last-updated { font-size: 11px; color: var(--text-tertiary); margin-top: 1.5rem; text-align: center; }
  </style>
</head>
<body>
<div class="brand">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="color:var(--text-secondary)"><path d="M4 5h16M4 5v2M20 5v2M12 5v15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
  <span class="brand-name">TauMail</span>
</div>
<div class="container">

  <div class="header">
    <span class="greeting">Hey, Tom</span>
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="inbox.html" style="font-size:13px;color:var(--text-tertiary);text-decoration:none;" onmouseover="this.style.color='var(--text-secondary)'" onmouseout="this.style.color='var(--text-tertiary)'">Inbox →</a>
      <a href="emails.html" style="font-size:13px;color:var(--text-tertiary);text-decoration:none;" onmouseover="this.style.color='var(--text-secondary)'" onmouseout="this.style.color='var(--text-tertiary)'">Course Emails →</a>
      <span class="date-str" id="today-str"></span>
    </div>
  </div>

  <div class="metric-grid">
    <div class="metric">
      <div class="metric-label">Due this week</div>
      <div class="metric-value" id="m-week">—</div>
      <div class="metric-sub">assignments</div>
    </div>
    <div class="metric">
      <div class="metric-label">Due today</div>
      <div class="metric-value" id="m-today">—</div>
      <div class="metric-sub">assignments</div>
    </div>
    <div class="metric">
      <div class="metric-label">Completed</div>
      <div class="metric-value" id="m-done">—</div>
      <div class="metric-sub">of <span id="m-total">—</span> total</div>
    </div>
  </div>

  <div class="section-label">Exam countdowns</div>
  <div class="exam-grid" id="exam-grid"></div>

  <div class="grid-main">
    <div>
      <div class="section-label">Your courses</div>
      <div class="card" id="courses-card"></div>
    </div>
    <div>
      <div class="section-label">
        Assignments
        <button class="refresh-btn" onclick="fetchAssignments()">↻ sync</button>
      </div>
      <div class="filter-row" id="filter-row"></div>
      <div class="card" id="assign-card"></div>
    </div>
  </div>

  <p class="last-updated" id="last-updated"></p>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Add exam</div>
    <div class="form-row">
      <label class="form-label">Exam name</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Midterm 2" />
    </div>
    <div class="form-row">
      <label class="form-label">Course</label>
      <select class="form-input" id="f-course">
        <option value="PHYSICS 240">Physics 240</option>
        <option value="ASIAN 325">Asian 325</option>
        <option value="CHEM 215">Chem 215</option>
        <option value="PSYCH 111">Psych 111</option>
        <option value="OTHER">Other</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">Date</label>
      <input class="form-input" id="f-date" type="date" />
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveExam()">Add exam</button>
    </div>
  </div>
</div>

<script>
const ASSIGNMENTS_CSV = localStorage.getItem('assignments_csv_url') || '';
const COURSES = {
  'PHYSICS 240': {color:'#dbeafe',text:'#1e40af'},
  'ASIAN 325':   {color:'#ede9fe',text:'#5b21b6'},
  'CHEM 215':    {color:'#d1fae5',text:'#065f46'},
  'PSYCH 111':   {color:'#fef3c7',text:'#92400e'},
  'OTHER':       {color:'#f1f0eb',text:'#5a5a55'},
};
const COURSE_NAMES = {'PHYSICS 240':'Physics 240','ASIAN 325':'Asian 325','CHEM 215':'Chem 215','PSYCH 111':'Psych 111'};

const today = new Date(); today.setHours(0,0,0,0);
let assignments = [];
let done     = new Set(JSON.parse(localStorage.getItem('tdone')  || '[]'));
let manualExams  = JSON.parse(localStorage.getItem('texams') || '[]');
let activeFilter = 'all';
let unreadByCourse = {};

const daysUntil = str => Math.round((new Date(str+'T00:00:00') - today) / 86400000);

function dueLabel(str) {
  const d = daysUntil(str);
  if(d < 0)  return {label:'Overdue', cls:'due-soon'};
  if(d === 0) return {label:'Due today', cls:'due-soon'};
  if(d === 1) return {label:'Due tomorrow', cls:'due-soon'};
  if(d <= 4)  return {label:`In ${d} days`, cls:'due-soon'};
  return {label: new Date(str+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}), cls:'due-future'};
}

function detectCourse(s) { for(const k of Object.keys(COURSES)) if(s.toUpperCase().includes(k)) return k; return null; }

function detectType(t) {
  const s = t.toLowerCase();
  if(/exam|midterm|final/.test(s)) return 'exam';
  if(/checkpoint/.test(s)) return 'checkpoint';
  if(/essay|critical term|writing|paragraph/.test(s)) return 'writing';
  if(/asynch|async/.test(s)) return 'asynch';
  return 'reading';
}

function parseICS(text) {
  const out = [];
  for(const block of text.split('BEGIN:VEVENT').slice(1)) {
    const sm = block.match(/SUMMARY[^:]*:(.+)/);
    const dm = block.match(/DTSTART[^:]*:(\d{8})/);
    if(!sm || !dm) continue;
    const raw = sm[1].replace(/\r/g,'').trim();
    const title = raw.replace(/\[.*?\]/g,'').replace(/\+/g,' ').trim();
    const course = detectCourse(raw);
    if(!course) continue;
    const ds = dm[1];
    const due = `${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}`;
    if(daysUntil(due) < 0) continue;
    const type = detectType(title);
    if(type === 'asynch' && course === 'PHYSICS 240') continue;
    out.push({title, course, due, type});
  }
  return out.sort((a,b) => new Date(a.due)-new Date(b.due));
}

function parseAssignmentCSV(text) {
  const rows = []; let row = []; let field = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        if (c === '\r') i++;
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

async function fetchAssignments() {
  // Show cached data instantly
  const cached = localStorage.getItem('tcached');
  if (cached) {
    try {
      assignments = JSON.parse(cached).filter(a => daysUntil(a.due) >= -1);
      renderAll();
    } catch {}
  }

  if (!ASSIGNMENTS_CSV) {
    // Prompt for URL if not set
    const url = prompt('Paste your published Google Sheet CSV URL for the assignments tab:');
    if (url && url.includes('docs.google.com')) {
      localStorage.setItem('assignments_csv_url', url);
      location.reload();
    }
    return;
  }

  document.getElementById('last-updated').textContent = 'Syncing...';
  try {
    const r = await fetch(ASSIGNMENTS_CSV);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const text = await r.text();
    const rows = parseAssignmentCSV(text);
    if (rows.length < 2) throw new Error('Empty sheet');
    assignments = rows.slice(1)
      .filter(r => r.length >= 4 && r[2])
      .map(r => ({ title: r[0], course: r[1], due: r[2], type: r[3] }))
      .filter(a => daysUntil(a.due) >= -1)
      .sort((a, b) => new Date(a.due) - new Date(b.due));
    localStorage.setItem('tcached', JSON.stringify(assignments));
    document.getElementById('last-updated').textContent = 'Synced · ' + new Date().toLocaleTimeString();
  } catch {
    document.getElementById('last-updated').textContent = cached
      ? 'Using cached data'
      : 'Could not load assignments';
  }
  renderAll();
}

// --- Exam countdowns ---
function getExams() {
  const fromCanvas = assignments.filter(a => a.type === 'exam');
  const all = [...fromCanvas, ...manualExams.filter(e => daysUntil(e.due) >= 0)];
  const seen = new Set();
  return all.filter(e => { const k=e.title+e.due; return seen.has(k)?false:(seen.add(k),true); })
            .sort((a,b) => new Date(a.due)-new Date(b.due));
}

function renderExams() {
  const list = getExams();
  document.getElementById('exam-grid').innerHTML =
    list.map(e => {
      const d = daysUntil(e.due);
      const c = COURSES[e.course] || COURSES['OTHER'];
      const isManual = manualExams.some(m => m.title===e.title && m.due===e.due);
      const mi = manualExams.findIndex(m => m.title===e.title && m.due===e.due);
      const urgent = d <= 7;
      return `<div class="exam-card${urgent?' urgent':''}">
        ${isManual ? `<button class="exam-delete" onclick="deleteExam(${mi})">×</button>` : ''}
        <div><span class="exam-course-pill" style="background:${c.color};color:${c.text}">${e.course}</span></div>
        <div class="exam-name">${e.title}</div>
        <div class="exam-days${urgent?' urgent':''}">${d}</div>
        <div class="exam-days-label">day${d===1?'':'s'} · ${new Date(e.due+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
      </div>`;
    }).join('') +
    `<button class="add-exam-btn" onclick="openModal()">+ add exam</button>`;
}

function openModal() { document.getElementById('modal-overlay').classList.add('open'); document.getElementById('f-name').focus(); }
function closeModal(e) {
  if(!e || e.target===document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('f-name').value='';
    document.getElementById('f-date').value='';
  }
}
function saveExam() {
  const name = document.getElementById('f-name').value.trim();
  const course = document.getElementById('f-course').value;
  const date = document.getElementById('f-date').value;
  if(!name||!date) { document.getElementById('f-name').focus(); return; }
  manualExams.push({title:name, course, due:date, type:'exam'});
  localStorage.setItem('texams', JSON.stringify(manualExams));
  closeModal();
  renderExams();
}
function deleteExam(i) {
  manualExams.splice(i,1);
  localStorage.setItem('texams', JSON.stringify(manualExams));
  renderExams();
}

// --- Courses ---
function renderCourses() {
  document.getElementById('courses-card').innerHTML = Object.entries(COURSE_NAMES).map(([k,v]) => {
    const c = COURSES[k];
    const n = assignments.filter(a=>a.course===k).length;
    const ur = unreadByCourse[k] || 0;
    return `<div class="course-row">
      <span class="course-name">${v}</span>
      <div style="display:flex;align-items:center;gap:8px;">
        ${ur > 0 ? `<span class="unread-badge">${ur} unread</span>` : ''}
        <span style="font-size:12px;color:var(--text-tertiary)">${n} upcoming</span>
        <span class="course-tag" style="background:${c.color};color:${c.text}">${k}</span>
      </div>
    </div>`;
  }).join('');
}

// --- Unread email indicators ---
function normalizeEmailCourse(from, subject) {
  const combined = (from + ' ' + subject).toUpperCase();
  const checks = [
    ['CHEM 215',    /CHEM(?:ISTRY)?\s*215/],
    ['PHYSICS 240', /PHYSICS\s*240/],
    ['ASIAN 325',   /ASIAN\s*325/],
    ['PSYCH 111',   /PSYCH\s*111/],
  ];
  for (const [name, re] of checks) {
    if (re.test(combined)) return name;
  }
  return null;
}

async function fetchUnreadCounts() {
  const csvUrl = localStorage.getItem('canvas_csv_url');
  if (!csvUrl) return;
  try {
    const r = await fetch(csvUrl);
    if (!r.ok) return;
    const text = await r.text();
    const rows = parseEmailCSV(text);
    const counts = {};
    // rows[0] = header: id,subject,from,date,body,unread
    for (let i = 1; i < rows.length; i++) {
      const row = rows[i];
      if (row.length < 6) continue;
      const isUnread = row[5] === 'TRUE' || row[5] === 'true';
      if (!isUnread) continue;
      const course = normalizeEmailCourse(row[2], row[1]);
      if (course) counts[course] = (counts[course] || 0) + 1;
    }
    unreadByCourse = counts;
    renderCourses();
  } catch {}
}

function parseEmailCSV(text) {
  const rows = []; let row = []; let field = ''; let inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n' || (c === '\r' && text[i+1] === '\n')) {
        if (c === '\r') i++;
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      } else field += c;
    }
  }
  if (field || row.length) { row.push(field); rows.push(row); }
  return rows;
}

// --- Assignments ---
function renderFilters() {
  const fs = ['all','this week','exam','writing','checkpoint','reading'];
  document.getElementById('filter-row').innerHTML = fs.map(f =>
    `<button class="filter-btn${activeFilter===f?' active':''}" onclick="setFilter('${f}')">${f}</button>`
  ).join('');
}
function setFilter(f) { activeFilter=f; renderFilters(); renderAssigns(); }

function renderAssigns() {
  const wEnd = new Date(today); wEnd.setDate(today.getDate()+7);
  const items = assignments.filter(a => {
    if(activeFilter==='this week') return new Date(a.due+'T00:00:00')<=wEnd;
    if(activeFilter==='all') return true;
    return a.type===activeFilter || (activeFilter==='writing'&&a.type==='essay');
  });
  const el = document.getElementById('assign-card');
  if(!items.length){ el.innerHTML='<p class="empty">No assignments match this filter.</p>'; updateMetrics(); return; }
  el.innerHTML = items.map(a => {
    const key = a.course+'|'+a.due+'|'+a.title;
    const isDone = done.has(key);
    const {label, cls} = dueLabel(a.due);
    const c = COURSES[a.course]||{color:'#f1f0eb',text:'#555'};
    return `<div class="assign-row${isDone?' done':''}" onclick="toggleDone('${key}')">
      <div class="checkbox${isDone?' checked':''}">${isDone?'✓':''}</div>
      <div style="flex:1;min-width:0;">
        <div class="assign-title">${a.title}</div>
        <div class="assign-meta">
          <span class="course-pill" style="background:${c.color};color:${c.text}">${a.course}</span>
          <span class="${isDone?'due-future':cls}">${label}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  updateMetrics();
}

function toggleDone(key) {
  done.has(key)?done.delete(key):done.add(key);
  localStorage.setItem('tdone', JSON.stringify([...done]));
  renderAssigns();
}

function updateMetrics() {
  const wEnd = new Date(today); wEnd.setDate(today.getDate()+7);
  document.getElementById('m-week').textContent = assignments.filter(a=>new Date(a.due+'T00:00:00')<=wEnd).length;
  document.getElementById('m-today').textContent = assignments.filter(a=>daysUntil(a.due)===0).length;
  document.getElementById('m-done').textContent = done.size;
  document.getElementById('m-total').textContent = assignments.length;
}

function renderAll() { renderExams(); renderCourses(); renderFilters(); renderAssigns(); }

document.getElementById('today-str').textContent = today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
fetchAssignments();
fetchUnreadCounts();
</script>
